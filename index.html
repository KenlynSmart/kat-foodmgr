<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNFS-Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="app" v-cloak class="min-h-screen flex flex-col">
    <section v-if="!isAuthenticated" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-700 via-emerald-600 to-teal-700 p-4">
      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl sm:p-8">
        <div class="mb-6 text-center">
          <div class="mx-auto mb-4 grid h-16 w-16 place-items-center rounded-3xl bg-emerald-100 text-emerald-700">
            <i class="fa-solid fa-bowl-food text-3xl"></i>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-900">VNFS-Portal</h1>
          <p class="mt-1 text-sm text-slate-500">Đăng nhập để tiếp tục quản lý phân phối</p>
        </div>
        <form @submit.prevent="loginWithCredentials" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-700">Tên đăng nhập</span>
            <input v-model.trim="loginForm.username" class="input w-full" autocomplete="username" required>
          </label>
          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-700">Mật khẩu</span>
            <input v-model="loginForm.password" type="password" class="input w-full" autocomplete="current-password" required>
          </label>
          <p v-if="authError" class="rounded-xl bg-rose-50 px-3 py-2 text-sm text-rose-700">{{ authError }}</p>
          <button type="submit" class="btn-primary w-full justify-center" :disabled="isLoggingIn">
            <i class="fa-solid" :class="isLoggingIn ? 'fa-spinner fa-spin' : 'fa-right-to-bracket'"></i>
            {{ isLoggingIn ? 'Đang xác thực...' : 'Đăng nhập' }}
          </button>
        </form>
        <div class="my-5 flex items-center gap-3 text-xs font-semibold text-slate-400">
          <span class="h-px flex-1 bg-slate-200"></span>
          HOẶC
          <span class="h-px flex-1 bg-slate-200"></span>
        </div>
        <button @click="loginWithGoogle" class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50" :disabled="isLoggingIn">
          <i class="fab fa-google text-red-500"></i>
          Đăng nhập bằng Google
        </button>
      </div>
    </section>
    <template v-else>
    <header class="no-print sticky top-0 z-40 bg-emerald-700 text-white shadow-lg">
      <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-3">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl bg-white text-emerald-700 grid place-items-center shadow-inner">
              <i class="fa-solid fa-bowl-food text-xl"></i>
            </div>
            <div class="flex flex-col">
              <span class="text-xl font-bold tracking-tight text-white">VNFS-Portal</span>
              <span class="text-xs font-extrabold uppercase tracking-wider text-emerald-200 bg-emerald-900/40 px-2 py-0.5 rounded-md w-fit mt-0.5 shadow-sm">
                {{ currentVendorName }}
              </span>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-2 text-xs">
            <span class="badge">Chế độ: Thủ công</span>
            <span class="badge">Trạng thái: {{ syncStatus }}</span>
            <span class="badge">Lần cuối: {{ lastSyncLabel }}</span>
            <button @click="manuallySyncAllData" :disabled="isSyncingManual" class="btn-ghost disabled:opacity-60">
              <i class="fas fa-sync" :class="isSyncingManual ? 'animate-spin' : ''"></i>
              {{ isSyncingManual ? 'Đang đồng bộ...' : 'Đồng bộ dữ liệu' }}
              <span v-if="pendingMutationCount" class="ml-1 rounded-full bg-amber-400 px-1.5 py-0.5 text-[10px] font-bold text-amber-950">{{ pendingMutationCount }}</span>
              <i v-else class="fa-solid fa-circle-check ml-1 text-emerald-200"></i>
            </button>
            <button v-if="deferredPrompt" @click="installApp" class="btn-ghost">
              <i class="fa-solid fa-mobile-screen-button"></i>
              Cài đặt Ứng dụng
            </button>
            <button @click="openUserCPModal" class="btn-ghost flex items-center gap-2">
              <i class="fas fa-user-circle text-emerald-200 text-lg"></i>
              <span class="flex flex-col items-start leading-tight">
                <span>{{ currentUser?.nickname || currentUser?.username || '' }}</span>
                <span v-if="currentUser?.vendor_name" class="text-[10px] font-medium text-emerald-100">{{ currentUser.vendor_name }}</span>
              </span>
            </button>
            <button @click="logout" class="btn-ghost">
              <i class="fa-solid fa-right-from-bracket"></i>
              Đăng xuất
            </button>
            <button @click="copyDebugLogs" class="btn-ghost">Sao chép log</button>
          </div>
        </div>
        <nav class="flex gap-1 overflow-x-auto pb-1">
          <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id" class="tab-btn" :class="currentTab === tab.id ? 'tab-btn-active' : ''">
            <i class="mr-2" :class="tab.icon"></i>{{ tab.label }}
          </button>
        </nav>
      </div>
    </header>

    <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 w-80 pointer-events-none no-print">
      <TransitionGroup name="notification" tag="div" class="flex flex-col gap-2">
      <div v-for="notification in notifications" :key="notification.id"
        class="pointer-events-auto flex items-center gap-3 rounded-xl border border-slate-100 bg-white p-4 shadow-xl text-sm"
        :class="notification.type === 'success' ? 'text-emerald-800' : notification.type === 'error' ? 'text-rose-800' : notification.type === 'warn' ? 'text-amber-800' : 'text-slate-800'">
        <i class="fa-solid" :class="notification.type === 'success' ? 'fa-circle-check text-emerald-600' : notification.type === 'error' ? 'fa-circle-xmark text-rose-600' : 'fa-circle-info text-slate-500'"></i>
        <span class="flex-1">{{ notification.message }}</span>
        <button @click="dismissNotification(notification.id)" class="shrink-0 p-1 text-slate-400 transition hover:text-slate-900" aria-label="Đóng thông báo">
          <i class="fas fa-times"></i>
        </button>
      </div>
      </TransitionGroup>
    </div>

    <div v-if="showIOSGuide" class="fixed inset-x-3 bottom-3 z-50 rounded-2xl border border-emerald-200 bg-white p-4 text-sm text-slate-700 shadow-2xl md:left-auto md:max-w-md">
      <div class="flex items-start gap-3">
        <div class="grid h-9 w-9 shrink-0 place-items-center rounded-xl bg-emerald-100 text-emerald-700">
          <i class="fa-solid fa-mobile-screen-button"></i>
        </div>
        <div class="flex-1">
          <div class="font-bold text-slate-900">Thêm VN Food vào màn hình chính</div>
          <p class="mt-1">
            Để thêm ứng dụng VN Food vào màn hình chính: Bấm vào biểu tượng Chia sẻ
            <i class="fas fa-share-nodes"></i> trên thanh công cụ Safari, cuộn xuống và chọn
            'Thêm vào MH chính' <i class="far fa-plus-square"></i>.
          </p>
        </div>
        <button @click="dismissIOSGuide" class="text-slate-400 hover:text-slate-700" aria-label="Đóng hướng dẫn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div v-if="showUserCPModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h2 class="text-xl font-bold text-slate-900">Trung Tâm Tài Khoản</h2>
            <p class="text-sm text-slate-500">{{ currentUser?.username || '' }}</p>
            <p v-if="currentUser?.vendor_name" class="text-xs font-semibold text-emerald-700">{{ currentUser.vendor_name }}</p>
          </div>
          <button @click="closeUserCPModal" class="text-slate-400 hover:text-slate-700" aria-label="Đóng">
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>
        <p v-if="userCPError" class="mt-4 rounded-xl bg-rose-50 px-3 py-2 text-sm text-rose-700">{{ userCPError }}</p>
        <div class="mt-5 grid gap-5 md:grid-cols-2">
          <form @submit.prevent="saveUserProfile" class="rounded-2xl border border-slate-200 p-4">
            <h3 class="font-bold text-slate-800">Cập nhật thông tin cá nhân</h3>
            <label class="mt-4 block">
              <span class="mb-1 block text-sm font-semibold text-slate-600">Tên hiển thị</span>
              <input v-model="userForm.nickname" class="input" maxlength="100" placeholder="Tên hiển thị">
            </label>
            <button type="submit" class="btn-primary mt-4 w-full justify-center" :disabled="userCPSaving">
              Lưu thay đổi
            </button>
          </form>
          <form @submit.prevent="changePassword" class="rounded-2xl border border-slate-200 p-4">
            <h3 class="font-bold text-slate-800">Đổi mật khẩu bảo mật</h3>
            <label class="mt-4 block">
              <span class="mb-1 block text-sm font-semibold text-slate-600">Mật khẩu hiện tại</span>
              <input v-model="passwordForm.oldPassword" type="password" class="input" autocomplete="current-password" required>
            </label>
            <label class="mt-3 block">
              <span class="mb-1 block text-sm font-semibold text-slate-600">Mật khẩu mới</span>
              <input v-model="passwordForm.newPassword" type="password" class="input" minlength="8" autocomplete="new-password" required>
            </label>
            <label class="mt-3 block">
              <span class="mb-1 block text-sm font-semibold text-slate-600">Xác nhận mật khẩu mới</span>
              <input v-model="passwordForm.confirmPassword" type="password" class="input" minlength="8" autocomplete="new-password" required>
            </label>
            <button type="submit" class="btn-primary mt-4 w-full justify-center" :disabled="userCPSaving">
              Đổi mật khẩu
            </button>
          </form>
        </div>
      </div>
    </div>

    <div v-if="showPasswordOnboarding" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950/85 p-4 no-print">
      <div class="w-full max-w-lg rounded-3xl bg-white p-6 shadow-2xl">
        <div class="flex items-center gap-3">
          <div class="grid h-12 w-12 place-items-center rounded-2xl bg-amber-100 text-amber-700">
            <i class="fa-solid fa-shield-halved text-xl"></i>
          </div>
          <div>
            <h2 class="text-xl font-bold text-slate-900">Thiết lập mật khẩu bắt buộc</h2>
            <p class="text-sm text-slate-500">Mã PIN tạm thời chỉ dùng cho lần đăng nhập đầu tiên.</p>
          </div>
        </div>
        <p v-if="userCPError" class="mt-4 rounded-xl bg-rose-50 px-3 py-2 text-sm text-rose-700">{{ userCPError }}</p>
        <form @submit.prevent="submitPasswordOnboarding" class="mt-5 space-y-4">
          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">PIN tạm thời</span>
            <input v-model="onboardingPasswordForm.oldPassword" type="password" inputmode="numeric" maxlength="4" class="input w-full" required>
          </label>
          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Mật khẩu mới</span>
            <input v-model="onboardingPasswordForm.newPassword" type="password" minlength="8" class="input w-full" autocomplete="new-password" required>
          </label>
          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Xác nhận mật khẩu mới</span>
            <input v-model="onboardingPasswordForm.confirmPassword" type="password" minlength="8" class="input w-full" autocomplete="new-password" required>
          </label>
          <button type="submit" class="btn-primary w-full justify-center" :disabled="userCPSaving">
            {{ userCPSaving ? 'Đang lưu...' : 'Thiết lập và tiếp tục' }}
          </button>
        </form>
      </div>
    </div>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 space-y-6">
      <section v-if="statusBanner" class="flex items-center justify-between rounded-2xl border border-amber-200 bg-amber-50 text-amber-800 px-4 py-3 text-sm">
        <div class="flex items-center gap-2 font-medium">
          <i class="fas fa-info-circle text-amber-600"></i>
          <span>{{ statusBanner }}</span>
        </div>
        <button @click="dismissStatusBanner" class="p-1 text-amber-500 transition hover:text-amber-900" aria-label="Đóng thông báo">
          <i class="fas fa-times"></i>
        </button>
      </section>

      <section v-show="currentTab === 'matrix'" class="space-y-6">
        <div class="panel flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <h2 class="section-title">Ma trận nhập liệu</h2>
            <p class="section-subtitle">Autocomplete theo mã/tên, lưu local ngay, tự sync lên backend khi mạng sẵn sàng.</p>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <label class="text-sm font-semibold text-slate-600">Ngày giao</label>
            <input type="date" v-model="deliveryDate" @change="changeDeliveryDate" class="input">
            <button @click="addRow" class="btn-primary">Thêm dòng</button>
            <button @click="clearRows" class="btn-danger">Xoá ngày này</button>
          </div>
        </div>

        <div class="panel overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-100 flex flex-wrap items-center justify-between gap-3 bg-slate-50">
            <div class="text-sm font-semibold text-slate-700">
              Tổng tiền trường: {{ money(totalSchoolMoney) }} · Thực mua: {{ money(totalRealCost) }} · Tiết kiệm: {{ money(totalSavedMoney) }}
            </div>
            <div class="text-xs text-slate-500">Local-first · chỉ đồng bộ khi người dùng bấm nút</div>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="thead">
                <tr>
                  <th class="th w-12 text-center">#</th>
                  <th class="th w-56">Shortcut</th>
                  <th class="th min-w-[180px]">Sản phẩm</th>
                  <th class="th w-20 text-center">ĐVT</th>
                  <th class="th w-28 text-right">Giá</th>
                  <th v-for="school in schools" :key="school.id" class="th text-center w-28 border-l">
                    <div class="flex flex-col items-center gap-1">
                      <span>{{ school.code || school.id }}</span>
                      <button @click="openSingleSchoolImportModal(school.id)" class="rounded-lg border border-emerald-200 bg-white px-2 py-1 text-[11px] text-emerald-700 hover:bg-emerald-50" :title="`Nhập đơn ${school.name}`">
                        <i class="fa-solid fa-file-import"></i> Nhập
                      </button>
                    </div>
                  </th>
                  <th class="th w-28 text-center">Tổng nhu cầu</th>
                  <th class="th w-32 text-right">Thành tiền</th>
                  <th class="th w-12"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                <tr v-for="(row, index) in paginatedRows" :key="row.id" class="align-top hover:bg-slate-50">
                  <td class="px-3 py-3 text-center text-slate-400">
                    <span v-if="row.isDirty" class="w-1.5 h-1.5 rounded-full bg-amber-500 inline-block animate-pulse mr-1"></span>
                    {{ (matrixPage - 1) * pageSize + index + 1 }}
                  </td>
                  <td class="px-3 py-3 relative">
                    <input v-model="row.searchQuery" @input="onShortcutInput(row)" @focus="lockCell(row, 'shortcut'); openSuggestions(row, $event)" @keydown="onShortcutKeydown($event, row)" @blur="unlockCell(row, 'shortcut'); closeSuggestions(row)" placeholder="tv, cl..." class="input uppercase font-semibold tracking-wide">
                    <teleport to="body">
                      <div v-if="row.showDropdown && row.suggestions.length" :style="suggestionStyle(row)" class="suggestions absolute z-50 left-0 mt-1 bg-white shadow-2xl border border-slate-200 rounded-xl overflow-y-auto max-h-60 w-[300px] xs:w-[380px] sm:w-[520px] md:w-[650px]">
                        <button v-for="(product, idx) in row.suggestions" :key="product.code" @mousedown.prevent="pickProduct(row, product)" class="suggestion-item grid grid-cols-12 gap-2 items-center px-4 py-2.5 cursor-pointer border-b border-slate-100 hover:bg-emerald-50 transition-colors duration-150 last:border-0" :class="idx === row.suggestIndex ? 'bg-emerald-50' : ''">
                          <span class="col-span-2 text-center font-bold tracking-wide text-xs bg-emerald-100 text-emerald-800 rounded-md px-1.5 py-0.5 uppercase truncate">{{ product.code }}</span>
                          <span class="col-span-5 text-slate-700 font-medium truncate text-left">{{ product.name }}</span>
                          <span class="col-span-2 text-slate-400 text-center text-xs truncate">{{ product.unit || '—' }}</span>
                          <span class="col-span-3 text-right text-xs font-semibold text-slate-600 font-mono">
                            <span v-if="product.is_market_price || product.isMarketPrice" class="inline-flex rounded-md bg-slate-100 px-1.5 py-0.5 text-slate-500">Thời giá</span>
                            <template v-else>{{ product.price ? money(product.price) : '—' }}</template>
                          </span>
                        </button>
                      </div>
                    </teleport>
                  </td>
                  <td class="px-3 py-3">
                    <div class="font-semibold text-slate-900">{{ row.productName || 'Chưa khớp mã' }}</div>
                    <div class="text-[11px] text-slate-400">{{ row.productName ? 'Đã map từ danh mục' : 'Chọn mã từ gợi ý' }}</div>
                  </td>
                  <td class="px-3 py-3 text-center">{{ row.unit || '-' }}</td>
                  <td class="px-3 py-3 text-right font-semibold">{{ row.price ? money(row.price) : '-' }}</td>
                  <td v-for="school in schools" :key="school.id" class="px-2 py-2 border-l border-slate-100">
                    <button @click="openBatchPopover(row, school, $event)" class="input flex w-full items-center justify-center gap-1 text-center">
                      <span>{{ qty(row.schoolQtys[school.id]) }}</span>
                      <span v-if="row.schoolBatches?.[school.id]?.length > 1" class="rounded-full bg-emerald-100 px-1 text-[10px] font-bold text-emerald-700">
                        • {{ row.schoolBatches[school.id].length }}đ
                      </span>
                    </button>
                  </td>
                  <td class="px-3 py-3 text-center font-bold text-emerald-700">{{ qty(row.totalQty) }}</td>
                  <td class="px-3 py-3 text-right font-extrabold">{{ money(row.subTotal) }}</td>
                  <td class="px-3 py-3 text-center">
                    <button @click="removeRow(row.id)" class="text-rose-500 hover:text-rose-700"><i class="fa-regular fa-trash-can"></i></button>
                  </td>
                </tr>
                <tr v-if="!rows.length">
                  <td :colspan="9 + schools.length" class="px-6 py-12 text-center text-slate-400 italic">Chưa có dòng nào.</td>
                </tr>
              </tbody>
            </table>
          </div>
          <teleport to="body">
            <div v-if="batchPopover.open" :style="batchPopover.position" class="absolute z-50 w-64 rounded-lg border border-slate-200 bg-white p-3 shadow-xl">
              <div class="mb-2 flex items-center justify-between">
                <span class="text-xs font-bold uppercase text-slate-500">Lịch sử các đợt</span>
                <button @click="closeBatchPopover" class="text-slate-400 hover:text-slate-700" aria-label="Đóng">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>
              <div class="max-h-32 space-y-1 overflow-y-auto">
                <div v-for="batch in activeBatchList()" :key="batch.id" class="flex items-start justify-between gap-2 rounded-md bg-slate-50 px-2 py-1.5 text-xs">
                  <span><strong>{{ batch.qty_change > 0 ? '+' : '' }}{{ qty(batch.qty_change) }}</strong> {{ batch.note }}</span>
                  <button @click="deleteBatch(batch.id)" class="shrink-0 text-rose-500 hover:text-rose-700" aria-label="Xóa đợt">
                    <i class="fa-regular fa-trash-can"></i>
                  </button>
                </div>
                <div v-if="!activeBatchList().length" class="py-2 text-center text-xs text-slate-400">Chưa có đợt nào.</div>
              </div>
              <div class="mt-3 border-t border-slate-100 pt-3">
                <input v-model="batchForm.qtyChange" type="number" step="any" class="input" placeholder="Số lượng +/-">
                <select v-model="batchForm.notePreset" class="input mt-2">
                  <option>Đợt bổ sung chiều</option>
                  <option>Trả hàng dư</option>
                  <option>Đợt sáng mặc định</option>
                  <option>Khác</option>
                </select>
                <input v-if="batchForm.notePreset === 'Khác'" v-model="batchForm.note" class="input mt-2" placeholder="Ghi chú đợt hàng">
                <button @click="applyBatchAdjustment" class="btn-primary mt-2 w-full justify-center">Áp dụng</button>
              </div>
            </div>
          </teleport>
          <div class="flex flex-wrap items-center justify-between gap-2 border-t border-slate-100 px-4 py-3 text-sm">
            <span class="text-slate-500">{{ paginationLabel(rows, matrixPage) }}</span>

                  <td class="px-3 py-2">{{ user.email || '—' }}</td>
                  <td class="px-3 py-2">
                    <select v-if="isAdmin && user.role !== 'admin'" v-model="user.vendor_id" class="input min-w-48">
                      <option v-for="vendor in vendors" :key="vendor.id" :value="vendor.id">{{ vendor.code }} — {{ vendor.name }}</option>
                    </select>
                    <span v-else>{{ vendors.find((vendor) => vendor.id === user.vendor_id)?.name || 'System' }}</span>
                  </td>
                  <td class="px-3 py-2">
                    <select v-if="isAdmin && user.role !== 'admin'" v-model="user.role" class="input">
                      <option value="owner">owner</option>
                      <option value="manager">manager</option>
                      <option value="staff">staff</option>
                      <option value="report-viewer">report-viewer</option>
                    </select>
                    <span v-else>{{ user.role }}</span>
                  </td>
                  <td class="px-3 py-2">
                    <select v-if="isAdmin && user.role !== 'admin'" v-model="user.status" class="input">
                      <option value="active">active</option>
                      <option value="locked">locked</option>
                    </select>
                    <span v-else>{{ user.status }}</span>
                  </td>
                  <td v-if="isAdmin" class="px-3 py-2 text-right">
                    <button v-if="user.role !== 'admin'" @click="saveUserAssignment(user)" class="btn-secondary whitespace-nowrap">Lưu gán</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <section v-show="currentTab === 'stock'" class="panel space-y-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <div>
            <h2 class="section-title">Quản Lý Tồn Kho</h2>
            <p class="section-subtitle">Điều chỉnh tồn kho nhanh bằng nút chạm hoặc nhập trực tiếp, đồng bộ tức thì.</p>
          </div>
          <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input v-model="stockFilter" class="input pl-9 w-72" placeholder="Tìm theo mã hoặc tên...">
          </div>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-slate-100">
          <table class="min-w-full text-sm">
            <thead class="thead">
              <tr>
                <th class="th w-12 text-center">#</th>
                <th class="th">Mã</th>
                <th class="th">Tên sản phẩm</th>
                <th class="th text-center w-24">ĐVT</th>
                <th class="th text-right w-80">Tồn kho khả dụng</th>
                <th class="th text-center w-28">Trạng thái</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
              <tr v-for="(product, index) in paginatedStockProducts" :key="product.id" class="hover:bg-slate-50">
                <td class="px-3 py-3 text-center text-slate-400">{{ (stockPage - 1) * pageSize + index + 1 }}</td>
                <td class="px-3 py-3 font-bold uppercase">{{ product.code }}</td>
                <td class="px-3 py-3">{{ product.name }}</td>
                <td class="px-3 py-3 text-center text-slate-500">{{ product.unit }}</td>
                <td class="px-3 py-3 text-right">
                  <div class="flex items-center justify-end gap-2">
                    <button @click="adjustStock(product, -1)" class="min-w-[2.5rem] h-10 rounded-full border border-slate-300 bg-slate-100 font-bold text-slate-700 hover:bg-slate-200 active:bg-slate-300 flex items-center justify-center transition">-1</button>
                    <button @click="adjustStock(product, -0.1)" class="min-w-[2.5rem] h-10 rounded-full border border-slate-300 bg-slate-100 font-bold text-slate-700 hover:bg-slate-200 active:bg-slate-300 flex items-center justify-center transition text-xs">-0.1</button>
                    <input type="number" min="0" step="any" v-model.number="stockMap[product.id]" @focus="setActiveEditingCell(`stock:${product.id}`, 'qty')" @blur="clearActiveEditingCell(); scheduleSync()" @change="scheduleSync" class="input w-24 text-right px-2">
                    <button @click="adjustStock(product, 0.1)" class="min-w-[2.5rem] h-10 rounded-full border border-slate-300 bg-slate-100 font-bold text-slate-700 hover:bg-slate-200 active:bg-slate-300 flex items-center justify-center transition text-xs">+0.1</button>
                    <button @click="adjustStock(product, 1)" class="min-w-[2.5rem] h-10 rounded-full border border-slate-300 bg-slate-100 font-bold text-slate-700 hover:bg-slate-200 active:bg-slate-300 flex items-center justify-center transition">+1</button>
                  </div>
                </td>
                <td class="px-3 py-3 text-center">
                  <span v-if="num(stockMap[product.id]) === 0" class="inline-flex items-center gap-1 rounded-full bg-amber-100 px-2.5 py-1 text-xs font-bold text-amber-800 border border-amber-200"><i class="fa-solid fa-triangle-exclamation"></i> Hết kho</span>
                  <span v-else class="text-emerald-600 text-xs font-semibold">Có hàng</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="flex flex-wrap items-center justify-between gap-2 border-t border-slate-100 px-4 py-3 text-sm">
          <span class="text-slate-500">{{ paginationLabel(filteredStockProducts, stockPage) }}</span>
          <div class="flex gap-2">
            <button @click="previousPage('stock')" :disabled="stockPage <= 1" class="btn-secondary disabled:opacity-50">Trước</button>
            <button @click="nextPage('stock', filteredStockProducts)" :disabled="stockPage >= stockPageCount" class="btn-secondary disabled:opacity-50">Sau</button>
          </div>
        </div>
      </section>

      <section v-show="currentTab === 'receipts'" class="space-y-4">
        <div class="panel flex flex-wrap items-center justify-between gap-3 no-print">
          <div>
            <h2 class="section-title">Biên bản giao hàng</h2>
            <p class="section-subtitle">In riêng từng trường hoặc toàn bộ; CSS print đã tách file riêng.</p>
          </div>
          <div class="flex gap-2">
            <button @click="printAllReceipts" class="btn-primary">In tất cả</button>
            <button @click="exportCSV" class="btn-secondary">Xuất CSV</button>
          </div>
        </div>

        <div class="grid gap-6">
          <article v-for="receipt in receipts" :key="receipt.id"
            :id="`print-receipt-container-${receipt.id}`"
            class="print-sheet print-card bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden"
            :class="printSchoolId !== 'all' && printSchoolId !== receipt.id ? 'print-hidden' : ''">
            <div class="p-5 flex flex-wrap items-center justify-between gap-3" :style="themeStyle(receipt.theme)">
              <div>
                <div class="text-xs uppercase font-bold opacity-80">Biên bản giao hàng</div>
                <h3 class="text-xl font-extrabold">{{ receipt.name }}</h3>
                <div class="text-sm opacity-90">Ngày giao: {{ deliveryDate }}</div>
              </div>
              <div class="flex gap-2 no-print">
                <button @click="printSchool(receipt.id)" class="btn-secondary bg-white">In trường này</button>
              </div>
            </div>
            <div class="p-5">
              <table class="min-w-full text-sm">
                <thead class="thead">
                  <tr><th class="th">Mã</th><th class="th">Tên</th><th class="th text-right">SL</th><th class="th text-right">Giá</th><th class="th text-right">Thành tiền</th></tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                  <tr v-for="item in receipt.items" :key="item.code">
                    <td class="px-3 py-2 font-semibold uppercase">{{ item.code }}</td>
                    <td class="px-3 py-2">{{ item.name }}</td>
                    <td class="px-3 py-2 text-right">{{ qty(item.qty) }}</td>
                    <td class="px-3 py-2 text-right">{{ money(item.price) }}</td>
                    <td class="px-3 py-2 text-right font-semibold">{{ money(item.amount) }}</td>
                  </tr>
                  <tr v-if="!receipt.items.length">
                    <td colspan="5" class="px-3 py-8 text-center text-slate-400 italic">Không có hàng cho trường này.</td>
                  </tr>
                </tbody>
              </table>
              <div class="mt-4 flex justify-between items-center text-sm font-semibold">
                <span>Tổng nhu cầu: {{ qty(receipt.totalQty) }}</span>
                <span>Tổng tiền: {{ money(receipt.totalAmount) }}</span>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section v-show="currentTab === 'debug'" class="terminal rounded-3xl border border-slate-800 shadow-xl overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between gap-3">
          <div>
            <h2 class="text-lg font-bold text-white">Debug Console Terminal</h2>
            <p class="text-sm text-slate-400">Log lỗi cloud, parser, sync và fallback.</p>
          </div>
          <div class="flex gap-2">
            <button @click="copyDebugLogs" class="btn-secondary bg-slate-100">Sao chép nhật ký</button>
            <button @click="debugLogs = []" class="btn-secondary bg-slate-700 text-white">Xoá log</button>
          </div>
        </div>
        <div class="p-5 space-y-3 max-h-[70vh] overflow-auto">
          <div v-for="log in debugLogs.slice().reverse()" :key="log.id" class="rounded-2xl border border-slate-700 bg-slate-900/80 p-4">
            <div class="flex flex-wrap items-center justify-between gap-2 text-xs text-slate-400">
              <span>{{ log.timestamp }}</span>
              <span>{{ log.context }}</span>
            </div>
            <pre class="mt-3 text-sm text-slate-200">{{ log.message }}</pre>
            <pre v-if="log.stack" class="mt-2 text-xs text-slate-500">{{ log.stack }}</pre>
          </div>
          <div v-if="!debugLogs.length" class="text-slate-500 italic">Chưa có log lỗi.</div>
        </div>
      </section>
    </main>

    <div v-if="showCatalogReviewModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-6xl rounded-2xl bg-white p-6 shadow-2xl space-y-4 max-h-[92vh] overflow-auto">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h3 class="text-lg font-bold text-emerald-700">Bảng Duyệt Danh Mục Mới &amp; Chuẩn Hóa Mã Hàng</h3>
            <p class="text-sm text-slate-500">Nhóm được trích xuất theo ngữ cảnh dòng; mã số/trống phải đổi thành shortcut chữ trước khi lưu.</p>
          </div>
          <button @click="resetCatalogImport()" class="btn-secondary">Hủy</button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="rounded-2xl bg-emerald-50 p-3"><div class="text-xs text-slate-500">Dòng đọc</div><strong>{{ catalogImportSummary?.totalRows || 0 }}</strong></div>
          <div class="rounded-2xl bg-emerald-50 p-3"><div class="text-xs text-slate-500">Nhóm phát hiện</div><strong>{{ catalogImportSummary?.totalCategories || 0 }}</strong></div>
          <div class="rounded-2xl bg-emerald-50 p-3"><div class="text-xs text-slate-500">Mặt hàng mới</div><strong>{{ catalogImportSummary?.newItems || 0 }}</strong></div>
          <div class="rounded-2xl bg-emerald-50 p-3"><div class="text-xs text-slate-500">Theo thời giá</div><strong>{{ catalogImportSummary?.marketPriceItems || 0 }}</strong></div>
        </div>
        <div class="space-y-2">
          <h4 class="font-bold">Nhóm hàng phát hiện</h4>
          <div class="flex flex-wrap gap-2">
            <span v-for="category in catalogReviewCategories" :key="category.name" class="rounded-full border px-3 py-1 text-sm" :class="category.isNew ? 'border-amber-300 bg-amber-50 text-amber-800' : 'border-slate-200 bg-slate-50'">{{ category.name }}</span>
          </div>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-slate-100">
          <table class="min-w-full text-sm">
            <thead class="thead"><tr><th class="th">Nhóm</th><th class="th">Mã gốc / shortcut</th><th class="th">Tên</th><th class="th">ĐVT</th><th class="th text-right">Giá</th><th class="th">Cờ</th></tr></thead>
            <tbody class="divide-y divide-slate-100">
              <tr v-for="item in catalogReviewItems" :key="item.id">
                <td class="px-3 py-2">{{ item.categoryName }}</td>
                <td class="px-3 py-2">
                  <input v-model="item.code" @input="item.code = item.code.trim().toLowerCase()" class="input uppercase" :class="catalogImportInvalidItems.includes(item) ? 'border-rose-400 bg-rose-50' : ''" placeholder="shortcut chữ">
                  <div v-if="catalogImportInvalidItems.includes(item)" class="mt-1 text-xs text-rose-600">
                    {{ !/^[a-z][a-z0-9_-]*$/i.test(item.code) ? 'Mã số/trống: bắt buộc dùng mã chữ.' : 'Shortcut bị trùng hoặc đã tồn tại.' }}
                  </div>
                </td>
                <td class="px-3 py-2"><input v-model="item.name" class="input"></td>
                <td class="px-3 py-2"><input v-model="item.unit" class="input"></td>
                <td class="px-3 py-2"><input v-model.number="item.price" type="number" min="0" class="input text-right"></td>
                <td class="px-3 py-2 whitespace-nowrap">
                  <span v-if="item.isMarketPrice" class="rounded-full bg-amber-100 px-2 py-1 text-xs text-amber-800">Theo thời giá</span>
                  <span v-if="item.existingProductId" class="rounded-full bg-slate-100 px-2 py-1 text-xs text-slate-600">Đã có</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div v-if="catalogReviewItems.length && !catalogImportReady" class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
          Mã số/trống hoặc mã trùng: bắt buộc chuẩn hóa shortcut trước khi gửi.
        </div>
        <div class="flex justify-end gap-2">
          <button @click="resetCatalogImport()" class="btn-secondary">Hủy nhập</button>
          <button @click="approveCatalogImport" :disabled="!catalogImportReady" class="btn-primary disabled:opacity-50">Xác Nhận Thêm Toàn Bộ Danh Mục</button>
        </div>
      </div>
    </div>

    <div v-if="showNewProductsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-5xl rounded-2xl bg-white p-6 shadow-2xl space-y-4 max-h-[90vh] overflow-auto">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h3 class="text-lg font-bold text-emerald-700">Bảng Kiểm Duyệt Bản Ghi Hệ Thống Mới</h3>
            <p class="text-sm text-slate-500">Kiểm tra sản phẩm và điểm trường mới trước khi đăng ký, sau đó nhập đơn vào ma trận.</p>
          </div>
          <button @click="resetExcelImport(); closeSingleSchoolImportModal()" class="btn-secondary">Hủy bỏ Import</button>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="thead">
              <tr><th class="th">Mã</th><th class="th">Tên sản phẩm</th><th class="th">ĐVT</th><th class="th text-right">Đơn giá</th></tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
              <tr v-for="item in quarantinedNewProducts" :key="item.id || item.code">
                <td class="px-3 py-2"><input v-model="item.code" class="input uppercase"></td>
                <td class="px-3 py-2"><input v-model="item.name" class="input"></td>
                <td class="px-3 py-2"><input v-model="item.unit" class="input"></td>
                <td class="px-3 py-2"><input v-model.number="item.price" type="number" min="0" class="input text-right"></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div v-if="quarantinedNewSchools.length" class="space-y-3">
          <h4 class="font-bold text-slate-900">Cấu hình Điểm Trường Mới</h4>
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="thead">
                <tr><th class="th">Mã trường</th><th class="th">Tên trường</th><th class="th">Màu giao diện</th></tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                <tr v-for="school in quarantinedNewSchools" :key="school.ref">
                  <td class="px-3 py-2"><input v-model="school.code" class="input"></td>
                  <td class="px-3 py-2"><input v-model="school.name" class="input"></td>
                  <td class="px-3 py-2">
                    <select v-model="school.theme" @change="applySchoolThemeToReview(school)" class="input">
                      <option v-for="theme in themes" :key="theme.bg_color" :value="theme.bg_color">{{ theme.label }}</option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <button @click="resetExcelImport(); closeSingleSchoolImportModal()" class="btn-secondary">Hủy bỏ Import</button>
          <button @click="approveNewProductsImport" class="btn-primary">Xác Nhận Thêm Toàn Bộ</button>
        </div>
      </div>
    </div>

    <div v-if="singleSchoolImportModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl space-y-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h3 class="text-lg font-bold text-emerald-700">Nhập đơn theo trường</h3>
            <p class="text-sm text-slate-500">Đích nhập: <strong>{{ schools.find(school => school.id === singleSchoolImportSchoolId || school.code === singleSchoolImportSchoolId)?.name || singleSchoolImportSchoolId }}</strong></p>
          </div>
          <button @click="closeSingleSchoolImportModal" class="btn-secondary">Đóng</button>
        </div>
        <div class="flex gap-2 border-b border-slate-200">
          <button @click="singleSchoolImportTab = 'file'" class="px-3 py-2 text-sm font-semibold" :class="singleSchoolImportTab === 'file' ? 'border-b-2 border-emerald-600 text-emerald-700' : 'text-slate-500'">Tải Excel</button>
          <button @click="singleSchoolImportTab = 'text'" class="px-3 py-2 text-sm font-semibold" :class="singleSchoolImportTab === 'text' ? 'border-b-2 border-emerald-600 text-emerald-700' : 'text-slate-500'">Dán văn bản</button>
        </div>
        <div v-if="singleSchoolImportTab === 'file'" class="rounded-2xl border-2 border-dashed border-emerald-200 bg-emerald-50/40 p-8 text-center">
          <i class="fa-solid fa-file-excel text-3xl text-emerald-600"></i>
          <p class="mt-2 text-sm text-slate-600">Chọn Excel có các cột Mã hàng, Tên hàng, ĐVT, Đơn giá, Số lượng.</p>
          <label for="single-school-excel-input" class="btn-primary mt-4 inline-block cursor-pointer">Chọn tệp .xlsx / .xls</label>
          <input ref="singleSchoolImportFileInput" id="single-school-excel-input" type="file" accept=".xlsx,.xls" @change="handleSingleSchoolExcelUpload" class="hidden">
        </div>
        <div v-else class="space-y-3">
          <label class="text-sm font-semibold text-slate-700">Dán văn bản đơn hàng (Zalo / SMS)</label>
          <textarea v-model="singleSchoolImportText" rows="10" class="textarea" placeholder="tv 10&#10;cl: 5"></textarea>
          <button @click="submitSingleSchoolTextImport" class="btn-primary">Phân tích và nhập</button>
        </div>
      </div>
    </div>

    <div v-if="showSchoolDeleteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl space-y-4">
        <h3 class="text-lg font-bold text-rose-700">Xác nhận xóa trường</h3>
        <p class="text-sm text-slate-600">Hành động này sẽ xóa trường <strong>{{ schoolToDelete?.name || schoolToDelete?.code || '' }}</strong> và có thể xóa dữ liệu lịch sử liên quan. Để tiếp tục, hãy nhập chính xác cụm từ bên dưới.</p>
        <div class="rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 text-sm font-mono text-amber-900 select-all">XAC NHAN XOA</div>
        <input v-model="schoolDeleteConfirmText" class="input w-full" placeholder="Nhập XAC NHAN XOA">
        <div class="flex gap-2 justify-end">
          <button @click="closeSchoolDeleteModal" class="btn-secondary">Huỷ</button>
          <button @click="confirmDeleteSchool" class="btn-danger">Xác nhận xóa</button>
        </div>
      </div>
    </div>

    <div v-if="showCategoryDeleteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 p-4 no-print">
      <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl space-y-4">
        <h3 class="text-lg font-bold text-rose-700">Xác nhận xóa nhóm hàng</h3>
        <p class="text-sm text-slate-600">Sản phẩm thuộc nhóm <strong>{{ categoryToDelete?.name || '' }}</strong> sẽ được giữ lại và bỏ liên kết nhóm.</p>
        <div class="rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 text-sm font-mono text-amber-900 select-all">XAC NHAN XOA NHOM</div>
        <input v-model="categoryDeleteConfirmText" class="input w-full" placeholder="Nhập XAC NHAN XOA NHOM">
        <div class="flex gap-2 justify-end">
          <button @click="closeCategoryDeleteModal" class="btn-secondary">Huỷ</button>
          <button @click="confirmDeleteCategory" class="btn-danger">Xác nhận xóa</button>
        </div>
      </div>
    </div>
    </template>
  </div>
</body>
</html>
